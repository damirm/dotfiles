right_format = "$time"

[aws]
disabled = true

[package]
disabled = true

[custom.cloudia-branch]
command = 'arc info --json | jq -r .branch'
when = 'arc root'

[kubernetes]
disabled = false
style = "blue bold"

[[kubernetes.contexts]]
context_pattern = ".*PROD.*"
style = "bold white bg:red"
symbol = "⛔ "

[[kubernetes.contexts]]
context_pattern = ".*preprod.*"
style = "bold yellow"

[time]
disabled = false
format = '[$time]($style) '
