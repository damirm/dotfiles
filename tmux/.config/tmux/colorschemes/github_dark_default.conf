# https://github.com/projekt0n/github-theme-contrib/blob/main/themes/tmux/github_dark_default.conf

set -g mode-style "fg=#e6edf3,bg=#0d1117"

set -g message-style "fg=#e6edf3,bg=#161b22"
set -g message-command-style "fg=#e6edf3,bg=#161b22"

set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#2f81f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#e6edf3,bg=#0d1117"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#e6edf3,bg=#2f81f7,bold] #S #[fg=#2f81f7,bg=#0d1117,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#30363d,bg=#0d1117,nobold,nounderscore,noitalics]#[fg=#e6edf3,bg=#30363d] #{prefix_highlight} #[fg=#30363d,bg=#30363d,nobold,nounderscore,noitalics]#[fg=#e6edf3,bg=#30363d] %Y-%m-%d  %I:%M %p #[fg=#2f81f7,bg=#30363d,nobold,nounderscore,noitalics]#[fg=#e6edf3,bg=#2f81f7,bold] #h "

setw -g window-status-activity-style "underscore,fg=#6e7681,bg=#0d1117"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#7d8590,bg=#0d1117"
setw -g window-status-format "#[fg=#0d1117,bg=#0d1117,nobold,nounderscore,noitalics]#[fg=#7d8590,bg=#0d1117,nobold,nounderscore,noitalics] #I  #W #F #[fg=#0d1117,bg=#0d1117,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0d1117,bg=#3fb950,nobold,nounderscore,noitalics]#[fg=#0d1117,bg=#3fb950,bold] #I  #W #F #[fg=#3fb950,bg=#0d1117,nobold,nounderscore,noitalics]"
